<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCC Portal Backend</title>
    <!-- Load Tailwind CSS -->
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script src="{{url_for('static',filename='tailwind.js')}}"></script>

    <link rel="icon" href="/static/torrent.ico">
    <!-- Use Inter font family -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            /* Subtle light green background gradient for a classic, clean feel */
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
            background-attachment: fixed;
        }

        .login-card {
            /* Custom green for accents (like a classic corporate green) */
            --green-accent: #38a169;
            /* White background for the card */
            background-color: white;
            /* Stronger, smoother shadow to lift the card off the subtle background */
            box-shadow: 0 15px 40px -8px rgba(0, 0, 0, 0.1), 0 8px 15px -5px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            /* Subtle border for definition */
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 45px -10px rgba(0, 0, 0, 0.18), 0 10px 20px -5px rgba(0, 0, 0, 0.08);
        }

        .submit-button {
            background-color: var(--green-accent);
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .submit-button:hover {
            background-color: #2f855a;
            /* Slightly darker green on hover */
        }

        .submit-button:active {
            transform: scale(0.99);
        }

        .input-field {
            border-color: #e2e8f0;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--green-accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(56, 161, 105, 0.3);
            /* Softer green ring effect */
        }

        /* Simple bouncing logo animation using CSS keyframes */
        @keyframes bounce-logo {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .logo-text:hover {
            animation: bounce-logo 0.6s ease-in-out infinite alternate;
            cursor: pointer;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Login Card Container - Centered on screen -->
    <div class="login-card w-full max-w-md p-8 sm:p-10 rounded-2xl">

        <!-- Logo and Title Section - Perfect Alignment -->
        <div class="text-center mb-10">
            <!-- Updated Logo: A Key icon for secure portal access, larger size -->
            <div class="flex justify-center mb-5">
                <img src="/static/torrent.ico" style="width: 25%;">
            </div>

            <h1 class="text-3xl font-extrabold text-gray-800 mb-2">DCC - BACKEND LOGIN</h1>
            <p class="text-gray-500">Access your secure services securely.</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="space-y-6">
                <!-- Username Field -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" name="username" required
                        class="input-field w-full px-4 py-3 border rounded-lg text-gray-800 placeholder-gray-400 focus:ring-green-500 focus:border-green-500"
                        placeholder="Enter your username">
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" name="password" required
                        class="input-field w-full px-4 py-3 border rounded-lg text-gray-800 placeholder-gray-400 focus:ring-green-500 focus:border-green-500"
                        placeholder="Enter your password">
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit"
                        class="submit-button w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-lg font-semibold text-white uppercase tracking-wider hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-green-500 focus:ring-opacity-50">
                        Sign In
                    </button>
                </div>
            </div>
        </form>

        <!-- Dynamic Message Box for feedback (instead of alert) -->
        <div id="message-box" class="mt-8 p-4 rounded-lg text-sm hidden transition duration-300"></div>

    </div>

    <script>

        async function loginUser(username, password) {
            // Convert password to SHA-256 hash
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashedPassword = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Prepare payload
            const payload = {
                username: username,
                password: hashedPassword
            };

            // Send POST request
            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const result = await response.json();
                    console.log("Login successful:", result);
                    window.location.href = "/apple"; // Redirect after success
                } else {
                    const error = await response.json();
                    console.error("Login failed:", error);
                    alert(error.error || "Login failed");
                }
            } catch (err) {
                console.error("Error:", err);
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const messageBox = document.getElementById('message-box');

            // Function to display messages in the UI
            function showMessage(message, type = 'success') {
                messageBox.textContent = message;
                messageBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');

                if (type === 'error') {
                    messageBox.classList.add('bg-red-100', 'text-red-700');
                } else {
                    messageBox.classList.add('bg-green-100', 'text-green-700');
                }

                // Show the box with a slight fade-in effect
                messageBox.style.opacity = 0;
                messageBox.classList.remove('hidden');
                setTimeout(() => messageBox.style.opacity = 1, 10);

                setTimeout(() => {
                    messageBox.style.opacity = 0;
                    setTimeout(() => messageBox.classList.add('hidden'), 300); // Hide after transition
                }, 4000); // Start fade-out after 4 seconds
            }

            // Handle form submission
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault(); // Prevent default form submission

                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                loginUser(username,password);

            });
        });
    </script>

</body>

</html>
