<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCC Portal Configuration</title>
    <!-- Load Tailwind CSS -->
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script src="{{url_for('static',filename='tailwind.js')}}"></script>

    <link rel="icon" href="/static/torrent.ico">
    <!-- Load Inter font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <style>
        /* Custom styles for the White & Blue theme */
        :root {
            --primary-blue: #2563eb;
            /* Tailwind blue-600 */
            --light-bg: #f9fafb;
            /* Tailwind gray-50 */
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Use a very light gray background */
            background-color: var(--light-bg);
            /* Dark text color for readability on light background */
            color: #1f2937;
            /* Tailwind gray-800 */
        }

        /* Custom blue shadow/border for the main card */
        .glow-border {
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.2), 0 0 5px rgba(37, 99, 235, 0.4);
            border: 1px solid var(--primary-blue);
        }

        /* Specific font for variables for a code feel */
        .variable-font {
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Smooth transitions for animations */
        .transition-all-smooth {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Responsive Grid for mobile optimization */
        @media (max-width: 640px) {
            .grid-cols-2 {
                grid-template-columns: 1fr;
                /* Stack columns on mobile */
            }

            .key-cell,
            .value-cell {
                padding: 1rem 0.5rem;
            }
        }
    </style>
</head>

<body class="min-h-screen p-4 sm:p-8 flex items-center justify-center">

    <div id="app-container"
        class="w-full max-w-5xl glow-border rounded-xl p-6 sm:p-10 transition-all-smooth bg-white backdrop-blur-sm shadow-xl">

        <!-- Header -->
        <header class="text-center mb-10 border-b pb-4 border-blue-500/50">
            <h1 class="text-4xl sm:text-5xl font-extrabold text-blue-700 variable-font">
                DCC Portal .env Configuration
            </h1>
            <p class="mt-2 text-slate-600 text-lg">
                TORRENT GAS PVT LTD
            </p>
        </header>

        <!-- Variable List Header Row -->
        <div
            class="grid grid-cols-2 gap-4 text-sm sm:text-lg font-bold uppercase tracking-wider text-blue-600 pb-3 border-b border-blue-400/50">
            <div class="key-cell pl-4 text-slate-700">Key Name</div>
            <div class="value-cell pl-4 text-green-600">Current Value (Click to Edit)</div>
        </div>

        <!-- Variable List Container -->
        <div id="env-vars-list" class="mt-4 space-y-2">
            <!-- Variables will be rendered here by JavaScript -->
        </div>
    </div>

    <!-- New Fixed Position Popup Container (Toast Notification) -->
    <div id="popup-container" class="fixed top-5 left-1/2 -translate-x-1/2 
        transition-all duration-300 ease-in-out 
        opacity-0 -translate-y-20 pointer-events-none z-50">
        <div id="message-box" class="p-4 rounded-lg shadow-2xl min-w-[300px] text-center font-medium" role="alert">
            <!-- Message Content will be populated here -->
        </div>
    </div>

    <script type="module">
        // Global variables for Firebase access (required for all collaborative apps)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;

        // Since this app only uses client-side mock data and doesn't require persistence or multi-user features, 
        // we'll use a simple mock data structure. If real persistence were needed, Firestore would be implemented here.

        const newMockEnvVars = {{ data | tojson | safe }};

        const envVarsList = document.getElementById('env-vars-list');
        const popupContainer = document.getElementById('popup-container');
        const messageBox = document.getElementById('message-box');

        let currentEnvVars = newMockEnvVars;

        // Keys containing these substrings will be treated as sensitive
        const SENSITIVE_KEY_SUBSTRINGS = ['KEY', 'SECRET', 'PASSWORD'];

        const HIDDEN_TRANSLATE_CLASS = '-translate-y-20';

        /**
         * Simulates a POST request to an API endpoint with the new configuration data.
         * @param {string} key - The configuration key name.
         * @param {string} newValue - The new value to set.
         * @returns {Promise<Object>} The API response object: {success: boolean, msg/error: string}.
         */


        /**
         * Checks if a key should be masked based on its name.
         */
        function isSensitive(key) {
            return SENSITIVE_KEY_SUBSTRINGS.some(substring => key.includes(substring));
        }

        /**
         * Masks the value for display (shows only asterisks).
         * Returns a placeholder if the value is empty.
         */
        function maskValue(value) {
            if (!value || value.length === 0) return '(empty, masked)';
            // Mask all characters, keeping a consistent length for display purposes
            return '•'.repeat(value.length > 30 ? 30 : value.length);
        }

        /**
         * Saves the current variables to localStorage (mocking persistence).
         */

        /**
         * Displays a confirmation message as a smooth, animated toast popup.
         * @param {string} message - The message content.
         * @param {'success'|'info'|'error'} type - The message type.
         */
        function showMessage(message, type) {

            messageBox.textContent = message;
            messageBox.className = 'p-4 rounded-lg shadow-2xl min-w-[300px] text-center font-medium transition-all-smooth';

            if (type === 'success') {
                messageBox.classList.add('bg-green-600', 'text-white');
            } else if (type === 'info') {
                messageBox.classList.add('bg-blue-600', 'text-white');
            } else if (type === 'error') {
                messageBox.classList.add('bg-red-500', 'text-white');
            } else {
                messageBox.classList.add('bg-gray-700', 'text-white');
            }

            popupContainer.classList.remove('opacity-0', HIDDEN_TRANSLATE_CLASS, 'pointer-events-none');
            popupContainer.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                popupContainer.classList.remove('opacity-100', 'translate-y-0');
                popupContainer.classList.add('opacity-0', HIDDEN_TRANSLATE_CLASS);

                setTimeout(() => {
                    popupContainer.classList.add('pointer-events-none');
                }, 300);

            }, 4000); // Display time slightly longer for API response
        }

        /**
         * Toggles the visibility of a sensitive variable's value.
         */
        function togglePassword(e, key) {
            e.stopPropagation(); // Prevent the click from starting the edit mode

            const cell = e.currentTarget.closest('.value-cell');
            const valueSpan = cell.querySelector('.variable-value');
            const toggleIcon = e.currentTarget;
            const isMasked = toggleIcon.getAttribute('data-masked') === 'true';
            const actualValue = currentEnvVars[key];

            const actualValueIsEmpty = !actualValue || actualValue.length === 0;

            if (isMasked) {
                // Show value 
                valueSpan.textContent = actualValueIsEmpty ? '(empty)' : actualValue;
                // Update icon to show it's currently visible (eye-open SVG)
                toggleIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" /><path fill-rule="evenodd" d="M1.323 11.447C2.88 7.398 7.25 4.5 12 4.5c4.75 0 9.12 2.898 10.677 6.947a1.442 1.442 0 0 1 0 1.106C21.12 16.602 16.75 19.5 12 19.5c-4.75 0-9.12-2.898-10.677-6.947a1.442 1.442 0 0 1 0-1.106Zm10.677 3.948a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd" /></svg>`;
                toggleIcon.setAttribute('data-masked', 'false');
                toggleIcon.setAttribute('title', 'Hide Value');
            } else {
                // Hide value
                valueSpan.textContent = maskValue(actualValue); // Re-masks it
                // Update icon to show it's currently hidden (eye-closed SVG)
                toggleIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M3.53 2.47a.75.75 0 0 0-1.06 1.06l18 18a.75.75 0 1 0 1.06-1.06l-18-18ZM22.846 12.016a.75.75 0 0 1 0 1.058C21.12 16.602 16.75 19.5 12 19.5c-1.377 0-2.67-.34-3.829-.942a.75.75 0 0 1 .638-1.391c.783.398 1.698.601 2.891.601 3.792 0 7.158-2.27 8.324-5.062a.75.75 0 0 1 0-.693c-.93-2.584-3.415-4.5-6.236-4.5a4.502 4.502 0 0 1-5.789 2.923.75.75 0 0 1-.58-1.385A3.001 3.001 0 0 0 12 4.5c4.75 0 9.12 2.898 10.677 6.947a.75.75 0 0 1 .169.57Z" /><path d="M12 9a3 3 0 0 1 3 3c0 .178-.01.355-.03.53a.75.75 0 0 1-1.391-.427 1.5 1.5 0 0 0-1.55-.993.75.75 0 1 1-.036-1.498Z" /></svg>`;
                toggleIcon.setAttribute('data-masked', 'true');
                toggleIcon.setAttribute('title', 'Hide Value');
            }
        }

        /**
         * Renders all environment variables to the DOM.
         */
        function renderVariables() {
            envVarsList.innerHTML = ''; // Clear existing list

            Object.keys(currentEnvVars).forEach(key => {
                const value = currentEnvVars[key];
                const sensitive = isSensitive(key);

                const row = document.createElement('div');
                row.className = 'grid grid-cols-2 gap-4 items-center p-4 rounded-lg bg-slate-50 hover:bg-slate-100 transition-all-smooth border border-slate-300 hover:border-blue-500/50';

                // Key Cell
                const keyCell = document.createElement('div');
                keyCell.className = 'key-cell text-slate-700 font-semibold variable-font break-words text-sm sm:text-base';
                keyCell.textContent = key;

                // Value Cell (Interactive)
                const valueCell = document.createElement('div');
                valueCell.className = 'value-cell flex items-center justify-between gap-2 variable-font text-green-600 cursor-pointer hover:text-green-700 transition-colors-smooth break-words text-sm sm:text-base';
                valueCell.setAttribute('data-key', key);

                // Value Display Span
                const valueSpan = document.createElement('span');
                valueSpan.className = 'variable-value truncate max-w-full';

                let displayValue;
                if (sensitive) {
                    displayValue = maskValue(value); // Returns '(empty, masked)' or '•••'
                } else {
                    // Show placeholder if not sensitive AND value is empty
                    displayValue = value.length === 0 ? '(empty)' : value;
                }

                valueSpan.textContent = displayValue;

                valueCell.appendChild(valueSpan);

                if (sensitive) {
                    // Password Toggle Button (Eye Icon SVG)
                    const toggleBtn = document.createElement('button');
                    toggleBtn.type = 'button';
                    toggleBtn.className = 'flex-shrink-0 text-blue-500 hover:text-blue-700 focus:outline-none transition-colors-smooth p-1 -m-1 rounded-full';
                    toggleBtn.setAttribute('data-masked', 'true');
                    toggleBtn.setAttribute('title', 'Show Value');

                    // Initial Icon (Eye-Closed)
                    toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M3.53 2.47a.75.75 0 0 0-1.06 1.06l18 18a.75.75 0 1 0 1.06-1.06l-18-18ZM22.846 12.016a.75.75 0 0 1 0 1.058C21.12 16.602 16.75 19.5 12 19.5c-1.377 0-2.67-.34-3.829-.942a.75.75 0 0 1 .638-1.391c.783.398 1.698.601 2.891.601 3.792 0 7.158-2.27 8.324-5.062a.75.75 0 0 1 0-.693c-.93-2.584-3.415-4.5-6.236-4.5a4.502 4.502 0 0 1-5.789 2.923.75.75 0 0 1-.58-1.385A3.001 3.001 0 0 0 12 4.5c4.75 0 9.12 2.898 10.677 6.947a.75.75 0 0 1 .169.57Z" /><path d="M12 9a3 3 0 0 1 3 3c0 .178-.01.355-.03.53a.75.75 0 0 1-1.391-.427 1.5 1.5 0 0 0-1.55-.993.75.75 0 1 1-.036-1.498Z" /></svg>`;

                    toggleBtn.addEventListener('click', (e) => togglePassword(e, key));
                    valueCell.appendChild(toggleBtn);
                }

                // Allow clicking the cell to start edit
                valueCell.addEventListener('click', (e) => startEdit(e, key));

                row.appendChild(keyCell);
                row.appendChild(valueCell);
                envVarsList.appendChild(row);
            });
        }

        /**
         * Converts the display value into an editable input field.
         */
        function startEdit(e, key) {
            const cell = e.currentTarget;
            const originalValue = currentEnvVars[key];

            // Prevent re-editing while in edit mode
            if (cell.querySelector('.edit-wrapper')) return;

            cell.innerHTML = ''; // Clear the current content
            cell.classList.remove('cursor-pointer', 'hover:text-green-700');

            // Create Input - ensure input type is 'text' so full value is visible for editing
            const input = document.createElement('input');
            input.type = 'text';
            input.value = originalValue;
            input.className = 'flex-grow px-2 py-1 bg-white border border-blue-500 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 variable-font text-slate-800 transition-all-smooth text-sm sm:text-base shadow-sm';
            input.setAttribute('data-key', key);

            // Create Save Button (Primary Blue)
            const saveBtn = document.createElement('button');
            saveBtn.textContent = 'Save';
            saveBtn.className = 'save-btn px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded-md text-white font-medium transition-all-smooth text-xs sm:text-sm shadow-md';

            // Create Cancel Button (Neutral Slate)
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel';
            cancelBtn.className = 'cancel-btn px-3 py-1 bg-slate-400 hover:bg-slate-500 rounded-md text-white font-medium transition-all-smooth text-xs sm:text-sm shadow-md';

            // Container for input and buttons (for clean horizontal layout)
            const editWrapper = document.createElement('div');
            editWrapper.className = 'edit-wrapper flex items-center space-x-2 w-full';

            editWrapper.appendChild(input);
            editWrapper.appendChild(saveBtn);
            editWrapper.appendChild(cancelBtn);

            cell.appendChild(editWrapper);
            input.focus();

            // Event listener for saving
            saveBtn.addEventListener('click', (e) => saveEdit(e, key, input.value, cell));

            // Event listener for cancelling
            cancelBtn.addEventListener('click', () => {
                // Since the DOM structure is complex now (span + button), a full re-render is cleanest
                renderVariables();
            });

            // Handle Enter keypress to save
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    saveEdit(e, key, input.value, cell);
                }
            });
        }

        /**
         * Saves the new value by calling the mock API and handles the response.
         */
        async function saveEdit(e, key, newValue, cell) {

            if (currentEnvVars[key] === newValue) {
                showMessage('No changes detected. API call skipped.', 'info');
                renderVariables();
                return;
            }

            const editWrapper = cell.querySelector('.edit-wrapper');
            const saveBtn = editWrapper.querySelector('.save-btn');
            const cancelBtn = editWrapper.querySelector('.cancel-btn');
            const input = editWrapper.querySelector('input');

            const originalValue = currentEnvVars[key];

            // 1. Show Loading State
            saveBtn.textContent = 'Saving...';
            saveBtn.disabled = true;
            cancelBtn.disabled = true;
            input.disabled = true;

            try {
                // 2. Call API

                const postData = {
                    kay_name: key,
                    key_value: newValue
                };

                const apiResponse = await fetch("/update-configuration", {
                    method: 'POST',  // HTTP method
                    headers: {
                        'Content-Type': 'application/json',  // Specify JSON content type
                        // Add other headers if necessary (e.g., Authorization, etc.)
                    },
                    body: JSON.stringify(postData)  // Convert the JavaScript object to JSON string
                });

                // Convert response to JSON
                const data = await apiResponse.json();  // This will give you the actual JSON response

                // 3. Process Response
                if (data.success) {
                    // Update local data only on successful API response
                    currentEnvVars[key] = newValue;
                    showMessage(data.msg || 'Configuration updated successfully.', 'success');
                    window.location.reload();
                    // setTimeout(() => {
                    //     location.reload(); // Reloads the current page
                    // }, 2000);

                } else {
                    // API reported failure (e.g., validation error)
                    showMessage(data.error || 'Failed to update configuration due to API error.', 'error');
                    // setTimeout(() => {
                    //     location.reload(); // Reloads the current page
                    // }, 2000);
                    // Data is not saved locally, so we fall through to the final render
                    // which will show the original value.
                }

            } catch (error) {
                // Handle actual network/promise error
                console.error("Network or unexpected API error:", error);
                showMessage('An unexpected error occurred during API communication.', 'error');
            } finally {
                // 4. Reset UI regardless of success/failure
                // A full re-render is the cleanest way to revert to the display mode
                renderVariables();
            }

        }

        // Initial render on load
        window.onload = renderVariables;

    </script>
</body>

</html>
