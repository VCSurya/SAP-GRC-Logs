<!-- templates/view_pdf.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  
  <title>View Latest PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/torrent.ico">
  <style>
    /* Make the viewer fill the viewport */
    html, body {
      height: 100%;
      margin: 0;
      background: #f5f7fa;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }
    .viewer {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      padding: 12px 16px;
      background: #0f62fe;
      color: white;
      font-weight: 600;
      letter-spacing: .2px;
    }
    .frame-wrap {
      padding: 0;
    }
    iframe, embed, object {
      width: 100%;
      height: calc(100vh - 56px); /* subtract header height */
      border: none;
      background: white;
    }
    .fallback {
      padding: 16px;
      color: #333;
    }
    .btn {
      display: inline-block;
      padding: 8px 12px;
      background: #0f62fe;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="viewer">
    <header>PDF Viewer</header>

    <div class="frame-wrap">
      <!-- Primary approach: iframe -->
      /pdf</iframe>

      <!-- Alternative tags (uncomment if preferred) -->
      <!-- /pdf -->
      <object data="/pdf" type="application/pdf">
        <div class="fallback">
          Your browser can’t display embedded PDFs.
          <br>
          /pdfOpen the PDF</a>
        </div>
      </object>
    </div>
  </div>
</body>
